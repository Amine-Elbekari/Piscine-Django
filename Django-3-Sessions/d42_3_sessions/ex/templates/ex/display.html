{% extends "base.html" %}

<div class="content">
    {% block content %}
        {% if not user.is_authenticated %}
            <nav>
                <a>Hello {{ setted_name }}!</a>
                <br>
                <a href="{% url 'login' %}">Sign-In</a>
                <br>
                <a href="{% url 'signup' %}">Sign-Up</a>
            </nav>
        {% else %}
            <nav>
                <a>Hello {{ user.username }}!</a>
                <br>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit">Log Out</button>
                </form>
            </nav>
        {% endif %}
    {% endblock %}
</div>
