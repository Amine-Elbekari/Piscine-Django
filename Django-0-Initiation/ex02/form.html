<!DOCTYPE html>
<html>
    <head>
        <title>Modern Pop-up</title>
    </head>
    <body>
        <form>
            <label for="firstname">Firstname: </label>
            <input type="text" id="firstname" name="firstname" required>
            <br>
            <label for="name">Name: </label>
            <input type="text" id="name" name="name" required>
            <br>
            <label for="age">Age: </label>
            <input type="number" id="age" name="age">
            <br>
            <label for="phone">Phone: </label>
            <input type="tel" id="phone" name="phone" pattern="0[5-7]-[0-9]{8}" required>
            <br>
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" required>
            <br>
            <label for="student">Student at 42 ?:</label>
            <input type="checkbox" id="student" name="student">
            <br>
            <label for="gender_male">Male</label>
            <input type="radio" id="gender_male" name="gender" value="Male">
            <label for="gender_female">Female</label>
            <input type="radio" id="gender_female" name="gender" value="Female">
        </form>
        <button type="submit" onclick="displayFormContents()" value="Run to get popup">Run to get popup !</button>
    <script src="../d00/ex02/popup.js"></script>
    </body>
</html>
