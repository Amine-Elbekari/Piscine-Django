{% extends "ex03/base.html" %}

{% block title %}
    <title>Dynamic Table</title>
{% endblock  %}

{% block style %}
    <style>
        th, td {
            height: 40px;
            width: 80px;
            border: 1px solid black;
        }
    </style>
{% endblock  %}

{% block content %}
    <table>
        <tr>
            <th>noir</th>
            <th>rouge</th>
            <th>bleu</th>
            <th>vert</th>
        </tr>
        
        {% for row in rows %}
            <tr>
                <td style="background-color: {{ row.black }};"></td>
                <td style="background-color: {{ row.red }};"></td>
                <td style="background-color: {{ row.blue }};"></td>
                <td style="background-color: {{ row.green }};"></td>
            </tr>
        {% endfor %}
    </table>
{% endblock  %}
