{% extends "base.html" %}

{% block title %}
    <title>Remove from from</title>
{% endblock  %}

{% block content %}

    <h1>Remove a Movie</h1>
    {% if choices %}
        <form method="post">
            {% csrf_token %}
            <label for="films_titles">Select movie to remove:</label>
            <select name="films_titles" id="films_titles">
                {% for title in choices %}
                    <option value="{{ title }}">{{ title }}</option>
                {% endfor %}
            </select>
            <br></br>
            <input method="post" type="submit" value="Remove">
        </form>
    {% else %}
        <p>No movies availble to remove. </p>
    {% endif %}
{% endblock  %}
