{% extends "base.html" %}

{% block content %}
<h2>Articles</h2>

    {% if article %}
        <table border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Created</th>
                    <th>Synopsis</th>
                    <th>Content</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><a href="{% url 'home' %}">{{ article.title }}</a></td>
                    <td>{{ article.author }}</td>
                    <td>{{ article.created }}</td>
                    <td>{{ article.synopsis }}</td>
                    <td>{{ article.content }}</td>
                </tr>
            </tbody>
        </table>
    {% else %}
        <h2>No articles provided yet</h2>
    {% endif %}
{% endblock %}
